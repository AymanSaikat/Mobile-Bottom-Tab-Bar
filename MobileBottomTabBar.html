  Author: Ayman Saikat
  Your Website Name — Mobile Bottom Tab Bar
  Paste this into: Elementor > Custom Code (Header/Footer)
  OR use a plugin like "Insert Headers and Footers"
  Place in: FOOTER section
   ============================================================ -->

<style>
/* ---- Hide on desktop, show on mobile ---- */
#bh-tab-bar-wrap {
  display: none;
}
@media (max-width: 768px) {
  #bh-tab-bar-wrap {
    display: block;
  }
  /* Push page content up so tab bar doesn't overlap footer */
  body {
    padding-bottom: 90px !important;
  }
}

/* ---- Floating Island Wrapper ---- */
#bh-tab-bar-wrap {
  position: fixed;
  bottom: 5px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 99999;
  width: calc(100% - 32px);
  max-width: 480px;
  pointer-events: none;
}

/* ---- The Island ---- */
#bh-tab-bar {
  background: rgba(251, 249, 245, 0.8);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 28px;
  border: 1px solid rgba(115, 92, 0, 0.10);
  box-shadow:
    0 4px 24px rgba(115, 92, 0, 0.10),
    0 1px 4px rgba(115, 92, 0, 0.06);
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 10px 8px 12px;
  pointer-events: all;
}

/* ---- Tab Buttons ---- */
.bh-tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  text-decoration: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 16px;
  transition: background 0.18s;
  -webkit-tap-highlight-color: transparent;
  min-width: 52px;
}
.bh-tab:active,
.bh-tab:hover {
  background: rgba(115, 92, 0, 0.08);
}
.bh-tab svg {
  width: 22px;
  height: 22px;
  stroke: #735C00;
  fill: none;
  stroke-width: 1.7;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: transform 0.15s;
}
.bh-tab:active svg {
  transform: scale(0.88);
}
.bh-tab span {
  font-size: 10px;
  font-weight: 500;
  color: #735C00;
  letter-spacing: 0.02em;
  font-family: inherit;
}
.bh-tab.active svg {
  stroke: #735C00;
  fill: rgba(115, 92, 0, 0.12);
}
.bh-tab.active span {
  font-weight: 700;
}

/* ---- Search Popup Overlay ---- */
#bh-search-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100000;
  background: rgba(60, 45, 0, 0.35);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  align-items: flex-end;
  justify-content: center;
}
#bh-search-overlay.open {
  display: flex;
  animation: bhFadeIn 0.2s ease;
}
@keyframes bhFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* ---- Search Sheet ---- */
#bh-search-sheet {
  background: #FBF9F5;
  border-radius: 28px 28px 0 0;
  padding: 20px 20px 36px;
  width: 100%;
  max-width: 540px;
  box-shadow: 0 -8px 40px rgba(115, 92, 0, 0.14);
  animation: bhSlideUp 0.25s cubic-bezier(0.34, 1.26, 0.64, 1);
}
@keyframes bhSlideUp {
  from { transform: translateY(100%); opacity: 0.5; }
  to   { transform: translateY(0);    opacity: 1; }
}

/* Drag handle */
#bh-search-sheet::before {
  content: '';
  display: block;
  width: 36px;
  height: 4px;
  background: rgba(115, 92, 0, 0.2);
  border-radius: 99px;
  margin: 0 auto 18px;
}

/* Search input row */
#bh-search-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #fff;
  border: 1.5px solid rgba(115, 92, 0, 0.18);
  border-radius: 14px;
  padding: 0 14px;
  margin-bottom: 14px;
}
#bh-search-row svg {
  width: 18px;
  height: 18px;
  stroke: #735C00;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
}
#bh-search-input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-size: 15px;
  color: #3a2e00;
  padding: 13px 0;
  font-family: inherit;
}
#bh-search-input::placeholder {
  color: rgba(115, 92, 0, 0.4);
}
#bh-clear-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  display: none;
  color: rgba(115, 92, 0, 0.5);
  font-size: 16px;
  line-height: 1;
}
#bh-clear-btn.show { display: block; }

/* Suggestions label */
#bh-suggestions-label {
  font-size: 11px;
  font-weight: 600;
  color: rgba(115, 92, 0, 0.5);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: none;
}
#bh-suggestions-label.show { display: block; }

/* Suggestions list */
#bh-suggestions {
  list-style: none;
  margin: 0;
  padding: 0;
  max-height: 280px;
  overflow-y: auto;
}
#bh-suggestions li {
  margin: 0;
  padding: 0;
}
#bh-suggestions a {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 10px;
  border-radius: 10px;
  text-decoration: none;
  transition: background 0.14s;
}
#bh-suggestions a:hover,
#bh-suggestions a:active {
  background: rgba(115, 92, 0, 0.07);
}
#bh-suggestions .bh-sug-thumb {
  width: 40px;
  height: 52px;
  border-radius: 6px;
  object-fit: cover;
  background: rgba(115, 92, 0, 0.08);
  flex-shrink: 0;
}
#bh-suggestions .bh-sug-thumb-placeholder {
  width: 40px;
  height: 52px;
  border-radius: 6px;
  background: rgba(115, 92, 0, 0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
#bh-suggestions .bh-sug-thumb-placeholder svg {
  width: 18px;
  height: 18px;
  stroke: rgba(115, 92, 0, 0.3);
  fill: none;
  stroke-width: 1.5;
}
#bh-suggestions .bh-sug-info {
  flex: 1;
  min-width: 0;
}
#bh-suggestions .bh-sug-name {
  font-size: 14px;
  font-weight: 500;
  color: #3a2e00;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
}
#bh-suggestions .bh-sug-price {
  font-size: 12px;
  color: #735C00;
  margin-top: 2px;
  display: block;
}
#bh-suggestions .bh-sug-cat {
  font-size: 11px;
  color: rgba(115, 92, 0, 0.5);
  display: block;
}

/* Loading / empty state */
#bh-search-status {
  text-align: center;
  font-size: 13px;
  color: rgba(115, 92, 0, 0.5);
  padding: 20px 0;
  display: none;
}
#bh-search-status.show { display: block; }

/* View all results button */
#bh-view-all {
  display: none;
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  background: #735C00;
  color: #FBF9F5;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  text-decoration: none;
  transition: background 0.15s;
}
#bh-view-all.show { display: block; }
#bh-view-all:hover { background: #5a4800; }
</style>

<!-- ============================================================
   HTML: Tab Bar Island
   ============================================================ -->
<div id="bh-tab-bar-wrap">
  <nav id="bh-tab-bar" role="navigation" aria-label="Main navigation">

    <!-- Home -->
    <a class="bh-tab" href="Your Website Name/" aria-label="Home">
      <svg viewBox="0 0 24 24" aria-hidden="true">

<!-- ============================================================
   HTML: Search Popup
   ============================================================ -->
<div id="bh-search-overlay" role="dialog" aria-modal="true" aria-label="Search books">
  <div id="bh-search-sheet">

    <div id="bh-search-row">
      <!-- Search icon -->
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="search"
        id="bh-search-input"
        placeholder="Search books, authors…"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        aria-label="Search books"
      />
      <button id="bh-clear-btn" aria-label="Clear search">✕</button>
    </div>

    <div id="bh-suggestions-label">Suggestions</div>
    <div id="bh-search-status"></div>
    <ul id="bh-suggestions" role="listbox" aria-label="Search suggestions"></ul>
    <a id="bh-view-all" href="#" role="button">View all results</a>

  </div>
</div>

<!-- ============================================================
   JavaScript
   ============================================================ -->

<script>
(function() {
  var siteUrl  = 'Your Website Name';
  var shopUrl  = siteUrl + '/shop/';
  var wcApi    = siteUrl + '/wp-json/wc/store/v1/products';

  var overlay  = document.getElementById('bh-search-overlay');
  var input    = document.getElementById('bh-search-input');
  var clearBtn = document.getElementById('bh-clear-btn');
  var sugg     = document.getElementById('bh-suggestions');
  var status   = document.getElementById('bh-search-status');
  var label    = document.getElementById('bh-suggestions-label');
  var viewAll  = document.getElementById('bh-view-all');
  var trigger  = document.getElementById('bh-search-trigger');
  var timer    = null;
  var lastQ    = '';

  /* Active tab highlight */
  var path = window.location.pathname;
  document.querySelectorAll('.bh-tab').forEach(function(t) {
    var h = t.getAttribute('href');
    if (h && new URL(h, location.origin).pathname === path) t.classList.add('active');
  });

  /* Open popup */
  trigger.addEventListener('click', function() {
    overlay.classList.add('open');
    setTimeout(function() { input.focus(); }, 280);
  });

  /* Close on backdrop */
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) close();
  });

  /* Close on Escape */
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') close();
  });

  function close() {
    overlay.classList.remove('open');
    input.value = '';
    reset();
  }

  function reset() {
    sugg.innerHTML = '';
    status.className = '';
    label.className = '';
    viewAll.className = '';
    clearBtn.className = '';
    lastQ = '';
  }

  /* Clear button */
  clearBtn.addEventListener('click', function() {
    input.value = '';
    reset();
    input.focus();
  });

  /* Enter key — go to shop search results */
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      var q = input.value.trim();
      if (q) window.location.href = shopUrl + '?s=' + encodeURIComponent(q);
    }
  });

  /* Typing — debounced */
  input.addEventListener('input', function() {
    var q = input.value.trim();
    clearBtn.className = q ? 'show' : '';
    clearTimeout(timer);
    if (!q) { reset(); return; }
    timer = setTimeout(function() { search(q); }, 350);
  });

  /* Single API call — WooCommerce Store API has everything: title, price, image, categories */
  function search(q) {
    if (q === lastQ) return;
    lastQ = q;
    sugg.innerHTML = '';
    label.className = '';
    viewAll.className = '';
    status.textContent = 'Searching…';
    status.className = 'show';

    fetch(wcApi + '?search=' + encodeURIComponent(q) + '&per_page=8')
      .then(function(r) {
        if (!r.ok) throw new Error(r.status);
        return r.json();
      })
      .then(function(data) {
        status.className = '';
        if (!data || data.length === 0) { empty(q); return; }
        label.className = 'show';
        data.forEach(function(item) {
          sugg.appendChild(makeItem(item));
        });
        setViewAll(q);
      })
      .catch(function() { empty(q); });
  }

  function empty(q) {
    status.textContent = 'No results for "' + q + '"';
    status.className = 'show';
    setViewAll(q);
  }

  function setViewAll(q) {
    viewAll.href = shopUrl + '?s=' + encodeURIComponent(q);
    viewAll.textContent = 'View all results for "' + q + '"';
    viewAll.className = 'show';
  }

  function makeItem(item) {
    var li = document.createElement('li');
    li.setAttribute('role', 'option');
    var a = document.createElement('a');
    a.href = item.permalink || '#';

    /* Thumbnail — Store API gives images array */
    var thumbUrl = null;
    try {
      if (item.images && item.images.length > 0) {
        thumbUrl = item.images[0].thumbnail || item.images[0].src;
      }
    } catch(e) {}

    if (thumbUrl) {
      var img = document.createElement('img');
      img.className = 'bh-sug-thumb';
      img.src = thumbUrl;
      img.alt = '';
      img.loading = 'lazy';
      a.appendChild(img);
    } else {
      var ph = document.createElement('div');
      ph.className = 'bh-sug-thumb-placeholder';
      ph.innerHTML = '<svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>';
      a.appendChild(ph);
    }

    /* Info */
    var info = document.createElement('div');
    info.className = 'bh-sug-info';

    /* Product name */
    var nameEl = document.createElement('span');
    nameEl.className = 'bh-sug-name';
    nameEl.textContent = decode(item.name || '');
    info.appendChild(nameEl);

    /* Price — Store API gives formatted price_html or prices object */
    var priceText = '';
    try {
      if (item.prices) {
        var raw = item.prices.price;
        var saleRaw = item.prices.sale_price;
        var curr = item.prices.currency_symbol || '';
        var decimals = item.prices.currency_minor_unit || 2;
        var divisor = Math.pow(10, decimals);
        var regular = parseFloat(parseInt(raw) / divisor).toFixed(decimals);

        if (saleRaw && saleRaw !== raw) {
          var sale = parseFloat(parseInt(saleRaw) / divisor).toFixed(decimals);
          priceText = curr + sale;
        } else {
          priceText = curr + regular;
        }
      }
    } catch(e) {}

    if (priceText) {
      var priceEl = document.createElement('span');
      priceEl.className = 'bh-sug-price';
      priceEl.textContent = priceText;
      info.appendChild(priceEl);
    }

    /* Real category name from Store API */
    var catText = '';
    try {
      if (item.categories && item.categories.length > 0) {
        catText = item.categories.map(function(c) { return c.name; }).join(', ');
      }
    } catch(e) {}

    if (catText) {
      var catEl = document.createElement('span');
      catEl.className = 'bh-sug-cat';
      catEl.textContent = catText;
      info.appendChild(catEl);
    }

    a.appendChild(info);

    var arr = document.createElement('span');
    arr.style.cssText = 'color:rgba(115,92,0,0.3);font-size:14px;flex-shrink:0';
    arr.textContent = '→';
    a.appendChild(arr);

    li.appendChild(a);
    return li;
  }

  function decode(html) {
    var t = document.createElement('textarea');
    t.innerHTML = html || '';
    return t.value;
  }
})();
</script>
